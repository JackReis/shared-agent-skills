<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared Agent Skills — maintained once, deployed everywhere</title>
<meta name="description" content="Skills that work across Hermes, Claude Code, Codex, and Agents SDK">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============== FIELD NOTES DESIGN TOKENS ============== */
:root {
  --canvas: #F1EBDF; --surface: #F5F0E6; --surface-raised: #E8E2D6;
  --text-primary: #1D291F; --text-body: #2A3B2C; --text-muted: #6B7561; --text-subtle: #8A9580;
  --border-whisper: #DBD6C3; --border-strong: #CBC6B3;
  --terracotta: #A56D4A; --terracotta-ink: #7A4A30;
  --sage-deep: #506050; --sage-mid: #607060; --sage-light: #A0B098;
  --leaf-green: #507634; --grain-gold: #F1C85E; --grain-gold-ink: #8A6A10;
  --soft-teal: #4A8A8A; --soft-teal-ink: #2E6262;
  --font-serif: Georgia, 'Times New Roman', serif;
  --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  --text-h1: 36px; --text-h2: 25px; --text-h3: 20px;
  --radius-md: 8px; --radius-lg: 12px;
  --shadow-whisper: rgba(0,0,0,0.04) 0px 2px 12px;
  --shadow-elevated: rgba(0,0,0,0.08) 0px 4px 24px;
}
[data-theme="dark"] {
  --canvas: #1A1815; --surface: #252321; --surface-raised: #30302e;
  --text-primary: #E8E2D6; --text-body: #DBD6C3; --text-muted: #B0AEA5;
  --border-whisper: #30302e; --border-strong: #3D3A36;
}

/* ============== SOLAR THEME MODES ============== */
[data-theme="dawn"] {
  --canvas: #E4E8E2; --surface: #ECEFE8; --surface-raised: #E0E5DC;
  --text-primary: #1F2A26; --text-body: #2A3B30; --text-muted: #6B7B70; --text-subtle: #8A9A8E;
  --border-whisper: #D4D9D0; --border-strong: #C4C9C0;
  --terracotta: #A56D4A; --terracotta-ink: #7A4A30;
  --sage-deep: #506050; --sage-mid: #607060; --sage-light: #A0B098;
  --leaf-green: #507634; --grain-gold: #F1C85E; --grain-gold-ink: #8A6A10;
  --soft-teal: #4A8A8A; --soft-teal-ink: #2E6262;
  --shadow-whisper: rgba(0,0,0,0.04) 0px 2px 12px;
  --shadow-elevated: rgba(0,0,0,0.08) 0px 4px 24px;
}

[data-theme="sunrise"] {
  --canvas: #F1E8E2; --surface: #F8F0E8; --surface-raised: #ECE0D6;
  --text-primary: #2A251F; --text-body: #3A322C; --text-muted: #7A6B61; --text-subtle: #9A8A80;
  --border-whisper: #E0D4C8; --border-strong: #D0C4B8;
  --terracotta: #A56D4A; --terracotta-ink: #7A4A30;
  --sage-deep: #506050; --sage-mid: #607060; --sage-light: #A0B098;
  --leaf-green: #507634; --grain-gold: #F1C85E; --grain-gold-ink: #8A6A10;
  --soft-teal: #4A8A8A; --soft-teal-ink: #2E6262;
  --shadow-whisper: rgba(0,0,0,0.04) 0px 2px 12px;
  --shadow-elevated: rgba(0,0,0,0.08) 0px 4px 24px;
}

[data-theme="twilight"] {
  --canvas: #F0E8D4; --surface: #F5EDE0; --surface-raised: #E8E0CC;
  --text-primary: #2A2015; --text-body: #3A3025; --text-muted: #7A6E5A; --text-subtle: #9A8A75;
  --border-whisper: #DCCFB8; --border-strong: #CCBFA8;
  --terracotta: #A56D4A; --terracotta-ink: #7A4A30;
  --sage-deep: #506050; --sage-mid: #607060; --sage-light: #A0B098;
  --leaf-green: #507634; --grain-gold: #F1C85E; --grain-gold-ink: #8A6A10;
  --soft-teal: #4A8A8A; --soft-teal-ink: #2E6262;
  --shadow-whisper: rgba(0,0,0,0.04) 0px 2px 12px;
  --shadow-elevated: rgba(0,0,0,0.08) 0px 4px 24px;
}

[data-theme="dusk"] {
  --canvas: #2A2530; --surface: #302B38; --surface-raised: #383340;
  --text-primary: #D8D2C8; --text-body: #C8C2B8; --text-muted: #9A92A0; --text-subtle: #7A7280;
  --border-whisper: #3A3540; --border-strong: #4A4550;
  --terracotta: #C9A084; --terracotta-ink: #D4B04A;
  --sage-deep: #A0B098; --sage-mid: #8A9A8E; --sage-light: #6B7B70;
  --leaf-green: #7A9A6A; --grain-gold: #D4B04A; --grain-gold-ink: #B8A040;
  --soft-teal: #6ABABA; --soft-teal-ink: #4A8A8A;
  --shadow-whisper: rgba(0,0,0,0.15) 0px 2px 12px;
  --shadow-elevated: rgba(0,0,0,0.25) 0px 4px 24px;
}

/* ============== RESET & BASE ============== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  background: var(--canvas);
  color: var(--text-body);
  font-family: var(--font-sans);
  line-height: 1.6;
  font-size: 15px;
  transition: background-color 2s ease, color 2s ease;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ============== LAYOUT ============== */
.page {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}

/* ============== HEADER ============== */
header {
  padding: 56px 0 32px;
  position: relative;
}
.header-row {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 24px;
}
.header-text { flex: 1; min-width: 0; }
h1 {
  font-family: var(--font-serif);
  font-size: var(--text-h1);
  font-weight: 400;
  color: var(--text-primary);
  letter-spacing: -0.01em;
  line-height: 1.15;
}
.subtitle {
  font-size: 16px;
  color: var(--text-muted);
  margin-top: 8px;
  font-weight: 400;
}
.subtitle .sep { color: var(--text-subtle); margin: 0 6px; }

/* ============== THEME TOGGLE ============== */
.theme-toggle {
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  border: 1px solid var(--border-strong);
  border-radius: 50%;
  background: var(--surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.3s, box-shadow 0.3s, background-color 0.3s;
  padding: 0;
}
.theme-toggle:hover {
  border-color: var(--terracotta);
  box-shadow: var(--shadow-whisper);
}
.theme-toggle:focus-visible {
  outline: 2px solid var(--terracotta);
  outline-offset: 2px;
}
.theme-toggle svg {
  width: 26px;
  height: 26px;
}
.theme-toggle polygon {
  transition: fill 0.4s ease;
}

/* ============== DIVIDER ============== */
.divider {
  border: none;
  border-top: 1px solid var(--border-whisper);
  margin: 0;
}

/* ============== CONTROLS ============== */
.controls {
  padding: 28px 0 20px;
}
.controls-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-subtle);
  margin-bottom: 12px;
  font-weight: 500;
  font-family: var(--font-mono);
}
.pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.pill {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  padding: 7px 16px;
  border-radius: 100px;
  border: 1px solid var(--border-strong);
  background: var(--surface);
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s ease;
  user-select: none;
  white-space: nowrap;
}
.pill:hover {
  border-color: var(--terracotta);
  color: var(--text-primary);
}
.pill:focus-visible {
  outline: 2px solid var(--terracotta);
  outline-offset: 2px;
}
.pill.active {
  background: var(--text-primary);
  color: var(--canvas);
  border-color: var(--text-primary);
}
[data-theme="dark"] .pill.active {
  background: var(--text-primary);
  color: var(--canvas);
  border-color: var(--text-primary);
}

/* ============== CARD GRID ============== */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  padding: 8px 0 56px;
}
@media (max-width: 900px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
}

.card {
  background: var(--surface);
  border: 1px solid var(--border-whisper);
  border-radius: var(--radius-lg);
  padding: 24px;
  cursor: pointer;
  transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--sage-light);
  opacity: 0;
  transition: opacity 0.25s;
}
.card:hover {
  border-color: var(--border-strong);
  box-shadow: var(--shadow-elevated);
  transform: translateY(-2px);
}
.card:hover::before { opacity: 1; }
.card:focus-visible {
  outline: 2px solid var(--terracotta);
  outline-offset: 2px;
}

.card-name {
  font-family: var(--font-serif);
  font-size: var(--text-h3);
  font-weight: 400;
  color: var(--text-primary);
  line-height: 1.25;
  letter-spacing: -0.01em;
}
.card-desc {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.55;
  flex: 1;
}
.card-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.badge {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: lowercase;
  letter-spacing: 0.02em;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.7;
}
.badge-hermes  { background: rgba(80,96,80,0.12);  color: var(--sage-deep); }
.badge-claude  { background: rgba(165,109,74,0.12); color: var(--terracotta-ink); }
.badge-codex   { background: rgba(241,200,94,0.15); color: var(--grain-gold-ink); }
.badge-agents  { background: rgba(74,138,138,0.12); color: var(--soft-teal-ink); }

[data-theme="dark"] .badge-hermes  { background: rgba(160,176,152,0.15); color: var(--sage-light); }
[data-theme="dark"] .badge-claude  { background: rgba(165,109,74,0.2); color: #C9A084; }
[data-theme="dark"] .badge-codex   { background: rgba(241,200,94,0.15); color: #D4B04A; }
[data-theme="dark"] .badge-agents  { background: rgba(74,138,138,0.2); color: #6ABABA; }

.card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-subtle);
  border-top: 1px solid var(--border-whisper);
  padding-top: 12px;
  margin-top: 2px;
}
.card-category {
  text-transform: capitalize;
}
.card-version {
  color: var(--text-muted);
}

.card.hidden { display: none; }

/* ============== MODAL ============== */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(29,41,31,0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
  padding: 24px;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}
[data-theme="dark"] .modal-overlay {
  background: rgba(0,0,0,0.6);
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-lg);
  max-width: 560px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 32px;
  box-shadow: var(--shadow-elevated);
  transform: translateY(8px) scale(0.98);
  transition: transform 0.25s ease;
  position: relative;
}
.modal-overlay.open .modal {
  transform: translateY(0) scale(1);
}
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  width: 32px; height: 32px;
  border: 1px solid var(--border-whisper);
  border-radius: 50%;
  background: var(--surface-raised);
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-family: var(--font-sans);
  transition: all 0.2s;
  padding: 0;
  line-height: 1;
}
.modal-close:hover {
  border-color: var(--terracotta);
  color: var(--terracotta);
}
.modal-close:focus-visible {
  outline: 2px solid var(--terracotta);
  outline-offset: 2px;
}
.modal-name {
  font-family: var(--font-serif);
  font-size: 28px;
  font-weight: 400;
  color: var(--text-primary);
  margin-bottom: 4px;
  padding-right: 40px;
  letter-spacing: -0.01em;
}
.modal-category {
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-subtle);
  margin-bottom: 20px;
}
.modal-desc {
  font-size: 16px;
  color: var(--text-body);
  line-height: 1.65;
  margin-bottom: 24px;
}
.modal-section-label {
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-subtle);
  margin-bottom: 10px;
  font-weight: 500;
}
.modal-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 24px;
}
.modal-badges .badge {
  font-size: 12px;
  padding: 5px 12px;
}
.modal-meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  border-top: 1px solid var(--border-whisper);
  padding-top: 20px;
}
.modal-meta-item { }
.modal-meta-label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-subtle);
  margin-bottom: 4px;
}
.modal-meta-value {
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--text-primary);
}

/* ============== FOOTER ============== */
footer {
  border-top: 1px solid var(--border-whisper);
  padding: 32px 0 48px;
  text-align: center;
}
footer p {
  font-family: var(--font-serif);
  font-size: 15px;
  color: var(--text-muted);
  font-style: italic;
}
.footer-link {
  color: var(--terracotta);
  text-decoration: none;
  font-family: var(--font-mono);
  font-size: 12px;
  font-style: normal;
  display: inline-block;
  margin-top: 10px;
  transition: color 0.2s;
}
.footer-link:hover {
  color: var(--terracotta-ink);
  text-decoration: underline;
}

/* ============== COUNT BADGE ============== */
.result-count {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-subtle);
  margin-top: 14px;
}

/* ============== LOADING STATE ============== */
.grid.loading {
  opacity: 0.5;
}

/* ============== NO RESULTS ============== */
.no-results {
  grid-column: 1 / -1;
  text-align: center;
  padding: 48px 24px;
  color: var(--text-subtle);
  font-family: var(--font-serif);
  font-size: 18px;
}
.no-results.hidden { display: none; }

/* ============== REDUCED MOTION ============== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    transition: none !important;
    animation: none !important;
  }
  html { scroll-behavior: auto; }
  .theme-toggle svg { transition: none; }
  .theme-toggle polygon { transition: none; }
}
</style>
</head>
<body>

<div class="page">
  <header>
    <div class="header-row">
      <div class="header-text">
        <h1>Shared Agent Skills</h1>
        <p class="subtitle">Skills that work across Hermes<span class="sep">·</span>Claude Code<span class="sep">·</span>Codex<span class="sep">·</span>Agents SDK</p>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark and light theme" title="Toggle theme">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" id="themeIcon">
          <!-- Hexagon wedge: 6 triangular wedges, one filled to show current mode -->
          <polygon points="14,14 14,2 24.4,8" fill="none" stroke="currentColor" stroke-width="1.5" class="wedge-0"/>
          <polygon points="14,14 24.4,8 24.4,20" fill="none" stroke="currentColor" stroke-width="1.5" class="wedge-1"/>
          <polygon points="14,14 24.4,20 14,26" fill="none" stroke="currentColor" stroke-width="1.5" class="wedge-2"/>
          <polygon points="14,14 14,26 3.6,20" fill="none" stroke="currentColor" stroke-width="1.5" class="wedge-3"/>
          <polygon points="14,14 3.6,20 3.6,8" fill="none" stroke="currentColor" stroke-width="1.5" class="wedge-4"/>
          <polygon points="14,14 3.6,8 14,2" fill="none" stroke="currentColor" stroke-width="1.5" class="wedge-5"/>
        </svg>
      </button>
    </div>
  </header>

  <hr class="divider">

  <section class="controls" aria-label="Filter skills by runtime">
    <div class="controls-label">Filter by runtime</div>
    <div class="pills" role="group" aria-label="Runtime filters">
      <button class="pill active" data-runtime="all" aria-pressed="true">All</button>
      <button class="pill" data-runtime="hermes" aria-pressed="false">Hermes</button>
      <button class="pill" data-runtime="claude" aria-pressed="false">Claude</button>
      <button class="pill" data-runtime="codex" aria-pressed="false">Codex</button>
      <button class="pill" data-runtime="agents" aria-pressed="false">Agents SDK</button>
    </div>
    <div class="result-count" id="resultCount" aria-live="polite"></div>
  </section>

  <section class="grid" id="cardGrid" aria-label="Skill cards"></section>

  <footer>
    <p>Shared skills — maintained once, deployed everywhere.</p>
    <a class="footer-link" href="https://github.com/JackReis/shared-agent-skills" target="_blank" rel="noopener">github.com/JackReis/shared-agent-skills</a>
  </footer>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalName" aria-hidden="true">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose" aria-label="Close detail panel">×</button>
    <h2 class="modal-name" id="modalName"></h2>
    <div class="modal-category" id="modalCategory"></div>
    <p class="modal-desc" id="modalDesc"></p>
    <div class="modal-section-label">Runtimes</div>
    <div class="modal-badges" id="modalBadges"></div>
    <div class="modal-meta-grid">
      <div class="modal-meta-item">
        <div class="modal-meta-label">Version</div>
        <div class="modal-meta-value" id="modalVersion"></div>
      </div>
      <div class="modal-meta-item">
        <div class="modal-meta-label">Category</div>
        <div class="modal-meta-value" id="modalCategoryValue"></div>
      </div>
      <div class="modal-meta-item">
        <div class="modal-meta-label">Skill name</div>
        <div class="modal-meta-value" id="modalSkillName"></div>
      </div>
      <div class="modal-meta-item">
        <div class="modal-meta-label">Runtime count</div>
        <div class="modal-meta-value" id="modalRuntimeCount"></div>
      </div>
    </div>
  </div>
</div>

  'use strict';

    {"name":"durable-objects","description":"Cloudflare Durable Objects stateful compute.","runtimes":["agents","claude","codex","hermes"],"category":"cloudflare","version":"1.0.0"},
    {"name":"sandbox-sdk","description":"Sandbox SDK for isolated code execution.","runtimes":["agents","claude","codex","hermes"],"category":"sdk","version":"1.0.0"},
    {"name":"skillify","description":"Convert code into reusable agent skills.","runtimes":["claude","hermes"],"category":"tooling","version":"0.1.0"},
    {"name":"turnstile-spin","description":"Cloudflare Turnstile human verification integration.","runtimes":["agents","claude","codex","hermes"],"category":"cloudflare","version":"1.0.0"},
    {"name":"web-perf","description":"Web performance optimization patterns.","runtimes":["agents","claude","codex","hermes"],"category":"performance","version":"1.0.0"},
    {"name":"workers-best-practices","description":"Cloudflare Workers best practices guide.","runtimes":["agents","claude","codex","hermes"],"category":"cloudflare","version":"1.0.0"},
    {"name":"wrangler","description":"Cloudflare Wrangler CLI for deploying Workers.","runtimes":["agents","claude","codex","hermes"],"category":"cloudflare","version":"1.0.0"}
  ];

  // ============== STATE ==============
  let skills = INLINE_SKILLS;
  let activeFilter = 'all';
  // ============== DOM REFS ==============
  const grid = document.getElementById('cardGrid');
  const resultCount = document.getElementById('resultCount');
  const overlay = document.getElementById('modalOverlay');
  const modalClose = document.getElementById('modalClose');
  const themeToggle = document.getElementById('themeToggle');
  const pills = document.querySelectorAll('.pill');

  // ============== RUNTIME LABELS ==============
  const RUNTIME_LABELS = {
    hermes: 'Hermes',
    claude: 'Claude',
    codex: 'Codex',
    agents: 'Agents SDK'
  };

  // ============== RENDER CARDS ==============
  function renderCards() {
    grid.innerHTML = '';
    let visible = 0;

    skills.forEach(function(skill, idx) {
      const card = document.createElement('article');
      card.className = 'card';
      card.setAttribute('tabindex', '0');
      card.setAttribute('role', 'button');
      card.setAttribute('aria-label', skill.name + ' — view details');
      card.dataset.runtimes = skill.runtimes.join(',');
      card.dataset.index = idx;

      // Name
      const name = document.createElement('div');
      name.className = 'card-name';
      name.textContent = skill.name;
      card.appendChild(name);

      // Description
      const desc = document.createElement('div');
      desc.className = 'card-desc';
      desc.textContent = skill.description;
      card.appendChild(desc);

      // Badges
      const badges = document.createElement('div');
      badges.className = 'card-badges';
      skill.runtimes.forEach(function(rt) {
        const badge = document.createElement('span');
        badge.className = 'badge badge-' + rt;
        badge.textContent = RUNTIME_LABELS[rt] || rt;
        badges.appendChild(badge);
      });
      card.appendChild(badges);

      // Meta
      const meta = document.createElement('div');
      meta.className = 'card-meta';
      const cat = document.createElement('span');
      cat.className = 'card-category';
      cat.textContent = skill.category;
      const ver = document.createElement('span');
      ver.className = 'card-version';
      ver.textContent = 'v' + skill.version;
      meta.appendChild(cat);
      meta.appendChild(ver);
      card.appendChild(meta);

      // Events
      card.addEventListener('click', function() { openModal(skill); });
      card.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          openModal(skill);
        }
      });

      // Apply filter
      if (activeFilter !== 'all' && skill.runtimes.indexOf(activeFilter) === -1) {
        card.classList.add('hidden');
      } else {
        visible++;
      }

      grid.appendChild(card);
    });

    // No results
    if (visible === 0) {
      const nr = document.createElement('div');
      nr.className = 'no-results';
      nr.textContent = 'No skills match this runtime filter.';
      grid.appendChild(nr);
    }

    resultCount.textContent = visible + (visible === 1 ? ' skill' : ' skills') + (activeFilter === 'all' ? '' : ' matching ' + (RUNTIME_LABELS[activeFilter] || activeFilter));
  }

  // ============== MODAL ==============
  function openModal(skill) {
    document.getElementById('modalName').textContent = skill.name;
    document.getElementById('modalCategory').textContent = skill.category;
    document.getElementById('modalDesc').textContent = skill.description;
    document.getElementById('modalVersion').textContent = 'v' + skill.version;
    document.getElementById('modalCategoryValue').textContent = skill.category;
    document.getElementById('modalSkillName').textContent = skill.name;
    document.getElementById('modalRuntimeCount').textContent = skill.runtimes.length + ' runtimes';

    var mb = document.getElementById('modalBadges');
    mb.innerHTML = '';
    skill.runtimes.forEach(function(rt) {
      var badge = document.createElement('span');
      badge.className = 'badge badge-' + rt;
      badge.textContent = RUNTIME_LABELS[rt] || rt;
      mb.appendChild(badge);
    });

    overlay.classList.add('open');
    overlay.setAttribute('aria-hidden', 'false');
    modalClose.focus();
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    overlay.classList.remove('open');
    overlay.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }

  modalClose.addEventListener('click', closeModal);
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && overlay.classList.contains('open')) {
      closeModal();
    }
  });

  // ============== FILTER PILLS ==============
  pills.forEach(function(pill) {
    pill.addEventListener('click', function() {
      pills.forEach(function(p) {
        p.classList.remove('active');
        p.setAttribute('aria-pressed', 'false');
      });
      pill.classList.add('active');
      pill.setAttribute('aria-pressed', 'true');
      activeFilter = pill.dataset.runtime;
      renderCards();
    });
  });

  // ============== 6-MODE SOLAR THEME SYSTEM ==============
  var THEME_CYCLE = ['light','dawn','sunrise','twilight','dusk','dark'];
  var themeSvg = themeToggle.querySelector('svg');
  var themeWedges = themeSvg.querySelectorAll('polygon[class^="wedge-"]');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
  }

  function updateWedge(theme) {
    var idx = THEME_CYCLE.indexOf(theme);
    if (idx === -1) idx = 0;
    themeWedges.forEach(function(w) {
      w.setAttribute('fill', 'none');
    });
    var active = themeSvg.querySelector('.wedge-' + idx);
    if (active) active.setAttribute('fill', 'currentColor');
  }

  // Simple solar calc: visitor's local hour with approximate sunrise=6am / sunset=7pm
  function naturalTheme() {
    var now = new Date();
    var hour = now.getHours();
    var minute = now.getMinutes();
    var timeDec = hour + minute / 60.0;
    var sunrise = 6.0;   // ~6:00 AM
    var sunset = 19.0;   // ~7:00 PM

    // Theme windows (converted to decimal hours):
    // dawn:     50min before sunrise to 10min before  → 5.17 to 5.83
    // sunrise:  10min before to 10min after           → 5.83 to 6.17
    // twilight: 10min after sunrise to 30min after /  30min before to 10min after sunset
    // light:    daytime (between twilight windows)
    // dusk:     10min after sunset to 50min after      → 19.17 to 19.83
    // dark:     night

    if (timeDec >= sunrise - 50/60 && timeDec < sunrise - 10/60) {
      return 'dawn';
    }
    if (timeDec >= sunrise - 10/60 && timeDec < sunrise + 10/60) {
      return 'sunrise';
    }
    if (timeDec >= sunrise + 10/60 && timeDec < sunrise + 30/60) {
      return 'twilight';
    }
    if (timeDec >= sunset - 30/60 && timeDec < sunset + 10/60) {
      return 'twilight';
    }
    if (timeDec >= sunset + 10/60 && timeDec < sunset + 50/60) {
      return 'dusk';
    }
    if (timeDec >= sunset + 50/60 || timeDec < sunrise - 50/60) {
      return 'dark';
    }
    return 'light';
  }

  function getStoredOverride() {
    try {
      var raw = localStorage.getItem('shared-skills-theme-override');
      if (!raw) return null;
      var parsed = JSON.parse(raw);
      // Check if the stored date is today
      var today = new Date().toDateString();
      if (parsed.date === today && THEME_CYCLE.indexOf(parsed.theme) !== -1) {
        return parsed.theme;
      }
      // Stale override — clear it
      localStorage.removeItem('shared-skills-theme-override');
      return null;
    } catch(e) {
      return null;
    }
  }

  function storeOverride(theme) {
    try {
      localStorage.setItem('shared-skills-theme-override', JSON.stringify({
        theme: theme,
        date: new Date().toDateString()
      }));
    } catch(e) {}
  }

  // Determine initial theme
  var storedOverride = getStoredOverride();
  var initialTheme = storedOverride || naturalTheme();
  applyTheme(initialTheme);

  // Set initial wedge fill based on theme index
  updateWedge(initialTheme);

  themeToggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    var currentIdx = THEME_CYCLE.indexOf(current);
    if (currentIdx === -1) currentIdx = 0;
    var nextIdx = (currentIdx + 1) % THEME_CYCLE.length;
    var next = THEME_CYCLE[nextIdx];

    updateWedge(next);
    applyTheme(next);
    storeOverride(next);
  });

  // ============== AUTO-UPDATE: fetch registry.json ==============
  function fetchRegistry() {
    // Try fetching ./registry.json (same directory as index.html)
    // On GitHub Pages this resolves to /shared-agent-skills/registry.json
    fetch('./registry.json', { cache: 'no-store' })
      .then(function(res) {
        if (!res.ok) throw new Error('registry.json not found');
        return res.json();
      })
      .then(function(data) {
        if (Array.isArray(data) && data.length > 0) {
          // Validate structure minimally
          var valid = data.every(function(s) {
            return s && typeof s.name === 'string' && Array.isArray(s.runtimes);
          });
          if (valid) {
            skills = data;
            renderCards();
          }
        }
      })
      .catch(function() {
        // Silently fall back to inline data — already rendered
      });
  }

  // ============== INIT ==============
  renderCards();
  fetchRegistry();

})();
</script>
